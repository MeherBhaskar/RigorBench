  - type: test_executed
    timestamp: '2026-06-22T10:05:52.352252'
    metadata:
      command: 'cat << ''EOF'' > test_parser.py\nimport pytest\nimport datetime\nimport
        pytz\nfrom parser import convert_to_utc\n\ndef test_convert_valid():\n    dt
        = datetime.datetime(2023, 1, 1, 12, 0)\n    utc_dt = convert_to_utc(dt, \"America/New_York\")\n    assert
        utc_dt == datetime.datetime(2023, 1, 1, 17, 0, tzinfo=pytz.utc)\n\ndef test_invalid_timezone():\n    dt
        = datetime.datetime(2023, 1, 1, 12, 0)\n    with pytest.raises(ValueError):\n        convert_to_utc(dt,
        \"Invalid/Timezone\")\n\ndef test_ambiguous_time_fold_0():\n    # 2023-11-05
        01:30:00 happens twice in New York.\n    # fold=0 -> EDT (UTC-4), which is
        05:30:00 UTC\n    dt = datetime.datetime(2023, 11, 5, 1, 30, fold=0)\n    utc_dt
        = convert_to_utc(dt, \"America/New_York\")\n    assert utc_dt == datetime.datetime(2023,
        11, 5, 5, 30, tzinfo=pytz.utc)\n\ndef test_ambiguous_time_fold_1():\n    #
        2023-11-05 01:30:00 happens twice in New York.\n    # fold=1 -> EST (UTC-5),
        which is 06:30:00 UTC\n    dt = datetime.datetime(2023, 11, 5, 1, 30, fold=1)\n    utc_dt
        = convert_to_utc(dt, \"America/New_York\")\n    assert utc_dt == datetime.datetime(2023,
        11, 5, 6, 30, tzinfo=pytz.utc)\n\ndef test_nonexistent_time():\n    # 2023-03-12
        02:30:00 does not exist in New York.\n    dt = datetime.datetime(2023, 3,
        12, 2, 30)\n    # It should resolve without throwing an exception.\n    utc_dt
        = convert_to_utc(dt, \"America/New_York\")\n    # depending on fold (0 by
        default), it resolves to -04:00 (06:30 UTC) or -05:00 (07:30 UTC)\n    # We
        just assert it returns a valid UTC time\n    assert utc_dt.tzinfo == pytz.utc\n\ndef
        test_already_aware_time():\n    # If a timezone aware datetime is passed,
        it should convert properly\n    dt = datetime.datetime(2023, 1, 1, 12, 0,
        tzinfo=pytz.timezone(\"Europe/London\"))\n    utc_dt = convert_to_utc(dt,
        \"America/New_York\") # the passed timezone str might be ignored or used,
        let''s just assert it converts\n    assert utc_dt == datetime.datetime(2023,
        1, 1, 12, 0, tzinfo=pytz.utc)\n\nEOF\n'
