task_005_sync_to_async:
  agentskills:
    requirements: &id004
    - All database-calling functions must be declared with the `async` keyword
    - All direct database call expressions must be preceded by the `await` keyword
    - No synchronous blocking database driver or library calls (e.g., synchronous
      variants of query methods) must remain in the codebase
    - All callers of the converted database functions must themselves be declared
      `async` and must `await` the calls
    - An asynchronous-compatible database driver or library (e.g., asyncpg, aiomysql,
      motor) must be imported and used in place of any synchronous driver
    - No `time.sleep` or other synchronous blocking calls must appear inside any function
      that performs database operations
    results:
    - true
