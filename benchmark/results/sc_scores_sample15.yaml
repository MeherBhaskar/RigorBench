task_002_split_module:
  agentskills:
    requirements: &id002
    - The original module is split into exactly 3 separate submodule files
    - Each submodule file contains fewer than 1000 lines of code
    - All public symbols (functions, classes, variables) previously defined in the
      original module are present across the 3 submodules
    - The original module file re-exports all public symbols from the 3 submodules
      to preserve the existing public API
    - No circular imports exist between the 3 submodules
    - Each submodule contains only logically related code (i.e., symbols are not arbitrarily
      distributed)
